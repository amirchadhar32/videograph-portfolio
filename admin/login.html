<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — BrainCore</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
  <link rel="stylesheet" href="admin.css" />
  <script src="../config.js"></script>
</head>

<body class="admin-page">
  <div class="admin-wrap">
    <a href="../index.html" class="admin-back">← Back to website</a>

    <div class="admin-login-card">
      <div class="admin-brand">
        <span class="logo-mark">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
          </svg>
        </span>
        BrainCore Admin
      </div>

      <h1 style="font-family:var(--font-display);font-size:28px;margin-bottom:8px;">Sign in</h1>
      <p style="color:var(--gray-2);margin-bottom:24px;font-size:14px;">Manage portfolio projects from your dashboard.
      </p>

      <div class="admin-note" id="firebaseConfigNote" hidden>
        Add your <strong>FIREBASE_CONFIG</strong> in <code>config.js</code>, then complete Firebase setup below.
      </div>
      <form id="adminLoginForm" class="admin-form">
        <div class="fg">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="username" />
        </div>
        <div class="fg">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Login to dashboard</button>
        <p class="admin-error" id="adminLoginError" hidden></p>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-projects.js"></script>
  <script src="../js/admin.js"></script>
</body>

</html>
