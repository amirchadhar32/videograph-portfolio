<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin Login — BrainCore</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { DEFAULT: '#FF6B2B', soft: '#ff8c55' },
            page: '#0a0a0f',
            surface: { DEFAULT: '#0f0f18', card: '#151520' },
          },
          fontFamily: { sans: ['Plus Jakarta Sans', 'system-ui', 'sans-serif'] },
        },
      },
    };
  </script>
  <script src="../config.js"></script>
</head>
<body class="h-full bg-page text-white font-sans antialiased">

  <div class="min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_top_right,rgba(255,107,43,0.12),transparent_50%)]"></div>
    <div class="absolute inset-0 bg-[radial-gradient(ellipse_at_bottom_left,rgba(123,94,167,0.1),transparent_50%)]"></div>

    <a href="../index.html" class="relative z-10 mb-8 text-sm font-semibold text-white/50 hover:text-brand transition">← Back to website</a>

    <div class="relative z-10 w-full max-w-md rounded-2xl bg-surface-card border border-white/10 shadow-2xl p-8">
      <div class="flex items-center gap-3 mb-8">
        <span class="w-11 h-11 rounded-xl bg-brand flex items-center justify-center shadow-[0_0_30px_rgba(255,107,43,0.35)]">
          <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </span>
        <div>
          <span class="block font-bold text-xl">BrainCore</span>
          <span class="block text-xs text-white/40">Admin Login</span>
        </div>
      </div>

      <h1 class="text-2xl font-bold mb-2">Sign in</h1>
      <p class="text-white/45 text-sm mb-6">Access your projects dashboard.</p>

      <div id="firebaseConfigNote" hidden class="mb-4 rounded-xl border border-amber-400/30 bg-amber-400/10 text-amber-200 text-xs p-3 leading-relaxed">
        Add <strong>FIREBASE_CONFIG</strong> in <code>config.js</code>, then enable Email/Password in Firebase Authentication.
      </div>

      <form id="adminLoginForm" class="space-y-5">
        <div>
          <label for="email" class="block text-xs font-bold uppercase tracking-wider text-white/40 mb-2">Email</label>
          <input type="email" id="email" name="email" required autocomplete="username" class="w-full bg-transparent border-0 border-b border-white/20 focus:border-brand px-0 py-2.5 text-white outline-none transition" />
        </div>
        <div>
          <label for="password" class="block text-xs font-bold uppercase tracking-wider text-white/40 mb-2">Password</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" class="w-full bg-transparent border-0 border-b border-white/20 focus:border-brand px-0 py-2.5 text-white outline-none transition" />
        </div>
        <button type="submit" class="w-full mt-2 py-3 rounded-full bg-brand hover:bg-brand-soft text-white font-bold text-sm shadow-[0_8px_32px_rgba(255,107,43,0.4)] transition">
          Login to dashboard
        </button>
        <p id="adminLoginError" hidden class="text-red-400 text-sm font-medium leading-relaxed"></p>
      </form>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-projects.js"></script>
  <script src="../js/admin.js"></script>
</body>
</html>
